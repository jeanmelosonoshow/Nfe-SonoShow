<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consulta DANFE | Sono Show</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">SS</div>
        <div>
          <strong>Sono Show Moveis</strong>
          <span>Consulta de DANFE</span>
        </div>
      </div>
      <a class="site-link" href="https://www.sonoshowmoveis.com.br/" target="_blank" rel="noreferrer">Site oficial</a>
    </header>

    <main>
      <section class="search-panel" aria-labelledby="page-title">
        <div class="search-copy">
          <p class="eyebrow">Nota Fiscal Eletronica</p>
          <h1 id="page-title">Consulte sua DANFE pela chave de acesso</h1>
          <p>Digite os 44 numeros da chave da NF-e para visualizar a DANFE e imprimir ou salvar em PDF.</p>
        </div>

        <form id="consulta-form" class="query-form">
          <label for="access-key">Chave de acesso</label>
          <div class="field-row">
            <input
              id="access-key"
              name="accessKey"
              inputmode="numeric"
              autocomplete="off"
              maxlength="54"
              placeholder="3326 0505 5072 1800 0150 5500 5000 0097 7610 0382 7351"
              required
            >
            <button type="submit">Consultar</button>
          </div>
          <p class="hint">A chave fica no DANFE ou no comprovante enviado pela loja.</p>
        </form>
      </section>

      <section id="status" class="status" role="status" aria-live="polite" hidden></section>

      <section id="actions" class="actions" hidden>
        <button id="print-button" type="button">Imprimir / Salvar PDF</button>
        <button id="xml-button" type="button" class="secondary">Baixar XML</button>
      </section>

      <section id="danfe" class="danfe-shell" hidden></section>
    </main>

    <template id="danfe-template">
      <article class="danfe-page">
        <section class="receipt-stub">
          <div class="stub-text">
            <p>Recebemos de <strong data-field="emitNome"></strong> os produtos constantes da Nota Fiscal Eletronica indicada ao lado.</p>
            <p data-field="resumoCanhoto"></p>
          </div>
          <div class="stub-date">
            <span>Data do recebimento</span>
          </div>
          <div class="stub-signature">
            <span>Identificacao e assinatura do recebedor</span>
          </div>
          <div class="stub-nfe">
            <strong>NF-e</strong>
            <span>Nº <b data-field="numero"></b></span>
            <span>Serie <b data-field="serie"></b></span>
          </div>
        </section>

        <div class="cut-line"></div>

        <section class="danfe-header">
          <div class="issuer danfe-cell">
            <strong data-field="emitNome"></strong>
            <span data-field="emitEndereco"></span>
            <span data-field="emitDoc"></span>
            <span data-field="emitIe"></span>
          </div>
          <div class="danfe-title danfe-cell">
            <strong>DANFE</strong>
            <span>Documento Auxiliar da Nota Fiscal Eletronica</span>
            <div class="operation-type">
              <span>0 - Entrada</span>
              <span>1 - Saida</span>
              <b data-field="tpNF"></b>
            </div>
            <small>Nº <b data-field="numero"></b></small>
            <small>Serie <b data-field="serie"></b> - Folha 1/1</small>
          </div>
          <div class="access-panel">
            <div class="barcode" aria-hidden="true"></div>
            <div class="access-key">
              <span>Chave de acesso</span>
              <strong data-field="chave"></strong>
            </div>
            <div class="auth-text">
              Consulta de autenticidade no portal nacional da NF-e
              www.nfe.fazenda.gov.br/portal ou no site da Sefaz autorizadora
            </div>
          </div>
        </section>

        <section class="danfe-row two-cols">
          <div class="danfe-cell">
            <span>Natureza da operacao</span>
            <strong data-field="natureza"></strong>
          </div>
          <div class="danfe-cell">
            <span>Protocolo de autorizacao de uso</span>
            <strong data-field="protocolo"></strong>
          </div>
        </section>

        <section class="danfe-row three-cols">
          <div class="danfe-cell"><span>Inscricao estadual</span><strong data-field="emitIEValue"></strong></div>
          <div class="danfe-cell"><span>Inscricao estadual do substituto tributario</span><strong data-field="emitIEST"></strong></div>
          <div class="danfe-cell"><span>CNPJ</span><strong data-field="emitCnpj"></strong></div>
        </section>

        <h2 class="section-title">Destinatario / Remetente</h2>
        <section class="danfe-grid destinatario-grid">
          <div class="danfe-cell wide"><span>Nome / razao social</span><strong data-field="destNome"></strong></div>
          <div class="danfe-cell"><span>CNPJ / CPF</span><strong data-field="destDocValue"></strong></div>
          <div class="danfe-cell"><span>Data da emissao</span><strong data-field="emissaoData"></strong></div>
          <div class="danfe-cell wide"><span>Endereco</span><strong data-field="destLogradouro"></strong></div>
          <div class="danfe-cell"><span>Bairro / distrito</span><strong data-field="destBairro"></strong></div>
          <div class="danfe-cell"><span>CEP</span><strong data-field="destCep"></strong></div>
          <div class="danfe-cell"><span>Municipio</span><strong data-field="destMunicipio"></strong></div>
          <div class="danfe-cell"><span>UF</span><strong data-field="destUF"></strong></div>
          <div class="danfe-cell"><span>Fone / fax</span><strong data-field="destFone"></strong></div>
          <div class="danfe-cell"><span>Inscricao estadual</span><strong data-field="destIE"></strong></div>
          <div class="danfe-cell"><span>Hora da saida</span><strong data-field="saidaHora"></strong></div>
        </section>

        <h2 class="section-title">Calculo do imposto</h2>
        <section class="tax-grid">
          <div class="danfe-cell"><span>Base calculo ICMS</span><strong data-field="vBC"></strong></div>
          <div class="danfe-cell"><span>Valor ICMS</span><strong data-field="vICMS"></strong></div>
          <div class="danfe-cell"><span>Base calculo ICMS ST</span><strong data-field="vBCST"></strong></div>
          <div class="danfe-cell"><span>Valor ICMS ST</span><strong data-field="vST"></strong></div>
          <div class="danfe-cell"><span>V. imp. importacao</span><strong data-field="vII"></strong></div>
          <div class="danfe-cell"><span>V. ICMS UF remet.</span><strong>0,00</strong></div>
          <div class="danfe-cell"><span>V. FCP UF dest.</span><strong>0,00</strong></div>
          <div class="danfe-cell"><span>Valor do PIS</span><strong data-field="vPIS"></strong></div>
          <div class="danfe-cell"><span>V. total produtos</span><strong data-field="vProd"></strong></div>
          <div class="danfe-cell"><span>Valor frete</span><strong data-field="vFrete"></strong></div>
          <div class="danfe-cell"><span>Valor seguro</span><strong data-field="vSeg"></strong></div>
          <div class="danfe-cell"><span>Desconto</span><strong data-field="vDesc"></strong></div>
          <div class="danfe-cell"><span>Outras despesas</span><strong data-field="vOutro"></strong></div>
          <div class="danfe-cell"><span>Valor IPI</span><strong data-field="vIPI"></strong></div>
          <div class="danfe-cell"><span>V. ICMS UF dest.</span><strong>0,00</strong></div>
          <div class="danfe-cell"><span>V. tot. trib.</span><strong data-field="vTotTrib"></strong></div>
          <div class="danfe-cell"><span>Valor da COFINS</span><strong data-field="vCOFINS"></strong></div>
          <div class="danfe-cell"><span>V. total da nota</span><strong data-field="vNF"></strong></div>
        </section>

        <h2 class="section-title" data-field="billingTitle">Fatura / Duplicatas</h2>
        <section class="billing-grid" data-field="billing"></section>

        <h2 class="section-title">Transportador / Volumes transportados</h2>
        <section class="transport-grid">
          <div class="danfe-cell wide"><span>Razao social</span><strong data-field="transportador"></strong></div>
          <div class="danfe-cell"><span>Frete por conta</span><strong data-field="modFrete"></strong></div>
          <div class="danfe-cell"><span>Placa do veiculo</span><strong data-field="placa"></strong></div>
          <div class="danfe-cell"><span>UF</span><strong data-field="veicUF"></strong></div>
          <div class="danfe-cell"><span>CNPJ / CPF</span><strong data-field="transpDoc"></strong></div>
          <div class="danfe-cell wide"><span>Endereco</span><strong data-field="transpEndereco"></strong></div>
          <div class="danfe-cell"><span>Municipio</span><strong data-field="transpMunicipio"></strong></div>
          <div class="danfe-cell"><span>UF</span><strong data-field="transpUF"></strong></div>
          <div class="danfe-cell"><span>Inscricao estadual</span><strong data-field="transpIE"></strong></div>
          <div class="danfe-cell"><span>Quantidade</span><strong data-field="qVol"></strong></div>
          <div class="danfe-cell"><span>Especie</span><strong data-field="espVol"></strong></div>
          <div class="danfe-cell"><span>Peso liquido</span><strong data-field="pesoL"></strong></div>
          <div class="danfe-cell"><span>Peso bruto</span><strong data-field="pesoB"></strong></div>
        </section>

        <h2 class="section-title">Dados dos produtos / servicos</h2>
        <section class="products-section">
          <div class="table-wrap">
            <table class="products-table">
              <colgroup>
                <col class="col-code">
                <col class="col-desc">
                <col class="col-ncm">
                <col class="col-cst">
                <col class="col-cfop">
                <col class="col-un">
                <col class="col-qty">
                <col class="col-unit">
                <col class="col-discount">
                <col class="col-total">
                <col class="col-bc">
                <col class="col-icms">
                <col class="col-ipi">
                <col class="col-aliq">
                <col class="col-aliq">
              </colgroup>
              <thead>
                <tr>
                  <th>Codigo</th>
                  <th>Descricao dos produtos / servicos</th>
                  <th>NCM</th>
                  <th>CST</th>
                  <th>CFOP</th>
                  <th>Un.</th>
                  <th>Qtd.</th>
                  <th>Valor un.</th>
                  <th>Desconto</th>
                  <th>Valor total</th>
                  <th>BC ICMS</th>
                  <th>Valor ICMS</th>
                  <th>Valor IPI</th>
                  <th>Aliq. ICMS</th>
                  <th>Aliq. IPI</th>
                </tr>
              </thead>
              <tbody data-field="items"></tbody>
            </table>
          </div>
        </section>

        <h2 class="section-title">Dados adicionais</h2>
        <section class="additional-grid">
          <div class="danfe-cell"><span>Informacoes complementares</span><p data-field="infCpl"></p></div>
          <div class="danfe-cell"><span>Reservado ao fisco</span><p data-field="infAdFisco"></p></div>
        </section>
      </article>
    </template>

    <template id="nfce-template">
      <article class="nfce-page">
        <div class="nfce-consulta">Data/Hora da Consulta: <span data-field="consultaDataHora"></span></div>

        <header class="nfce-issuer">
          <strong data-field="emitNome"></strong>
          <span data-field="emitDoc"></span>
          <span data-field="emitEndereco"></span>
        </header>

        <div class="nfce-title">Documento Auxiliar da Nota Fiscal de Consumidor Eletronica</div>

        <section class="nfce-products">
          <div data-field="items"></div>
        </section>

        <section class="nfce-totals">
          <div><span>Qtd. total de itens:</span><strong data-field="itemCount"></strong></div>
          <div><span>Valor a pagar R$:</span><strong data-field="vNFNumber"></strong></div>
          <div><span>Valor pago R$:</span><strong data-field="valorPagoNumber"></strong></div>
        </section>

        <section class="nfce-payment">
          <h2>Forma de pagamento:</h2>
          <div data-field="payments"></div>
        </section>

        <section class="nfce-trib">
          <span data-field="tributos"></span>
        </section>

        <section class="nfce-general">
          <h2>Informações gerais da Nota</h2>
          <strong data-field="mensagemFiscal"></strong>
          <span>Número: <b data-field="numero"></b> Série: <b data-field="serie"></b> Emissão: <b data-field="emissaoCompleta"></b> - Via Consumidor</span>
          <span>Protocolo de Autorização: <b data-field="protocolo"></b></span>
          <span>Ambiente de Produção - Versão XML: 4.00</span>
        </section>

        <section class="nfce-access">
          <h2>Chave de acesso</h2>
          <span>Consulte pela Chave de Acesso em</span>
          <span data-field="consultaUrl"></span>
          <strong>Chave de acesso: <b data-field="chave"></b></strong>
        </section>

        <section class="nfce-consumer">
          <h2>Consumidor</h2>
          <span data-field="destDoc"></span>
          <strong data-field="destNome"></strong>
          <span data-field="destEnderecoNfce"></span>
        </section>

        <section class="nfce-qr">
          <div class="qr-placeholder" aria-hidden="true">QR</div>
        </section>

        <section class="nfce-extra">
          <h2>Informações de interesse do contribuinte</h2>
          <span data-field="infCpl"></span>
        </section>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
